name: Dispatch Profile Workout Graph Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if token is missing
        if: ${{ secrets.PROFILE_REPO_DISPATCH_TOKEN == '' }}
        run: |
          echo "PROFILE_REPO_DISPATCH_TOKEN is not set."
          echo "Set it in repo secrets to enable immediate profile graph updates on push."

      - name: Dispatch profile workflow
        if: ${{ secrets.PROFILE_REPO_DISPATCH_TOKEN != '' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.PROFILE_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          payload='{"event_type":"workout-graph-update","client_payload":{"target_repo":"StefanNa/MySportacus"}}'
          for attempt in 1 2 3; do
            if curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/StefanNa/StefanNa/dispatches \
              -d "${payload}"; then
              echo "Dispatched profile graph update."
              exit 0
            fi
            echo "Dispatch attempt ${attempt} failed; retrying..."
            sleep $((attempt * 3))
          done
          echo "Failed to dispatch profile graph update after retries."
          exit 1
